spring:
  kafka:
    bootstrap-servers: 100.74.24.124:29092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      group-id: log-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.ByteArrayDeserializer
      value-deserializer: org.apache.kafka.common.serialization.ByteArrayDeserializer

# STOMP over WebSocket:
#   SockJS:     http://<host>:<port>/ws
#   Native WS:  ws://<host>:<port>/ws-stream
# Subscribe (after STOMP CONNECT):
#   /topic/logs           — JSON LogDto (from logs.raw OTLP)
#   /topic/metrics        — JSON MetricsDto (fleet aggregate, ~1 Hz)
#   /topic/fleet-services — JSON FleetServicesDto (per-service table, ~1 Hz)
#   /topic/host-metrics   — JSON HostMetricsDto (from metrics.raw OTLP)
#   /topic/anomalies      — JSON AnomalyDto (rule engine, ~1 Hz + host metrics)

server:
  port: 8080

clickhouse:
  url: jdbc:clickhouse://100.74.24.124:8123/observability
  username: default
  password:

causr:
  kafka:
    topics:
      metrics-raw: metrics.raw
      logs-anomalies: logs.anomalies
pagerduty:
     enabled: true
     url: 'https://events.pagerduty.com/v2/enqueue'
     routing-key: 'your-routing-key'
     threshold: 80
     connect-timeout-ms: 3000
     read-timeout-ms: 500     
slack:
     enabled: true
     webhook-url: ${SLACK_WEBHOOK_URL}
     dashboard-url: 'https://causr.netlify.app/alerts'