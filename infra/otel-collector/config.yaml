receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:

exporters:
  kafka/logs:
    brokers:
      - kafka:9092
    protocol_version: 2.0.0
    topic: logs.raw
    encoding: otlp_proto

  kafka/traces:
    brokers:
      - kafka:9092
    protocol_version: 2.0.0
    topic: traces.raw
    encoding: otlp_proto

service:
  pipelines:
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [kafka/logs]
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [kafka/traces]
