spring:
  kafka:
    bootstrap-servers: 100.74.24.124:29092
    consumer:
      group-id: log-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.ByteArrayDeserializer
      value-deserializer: org.apache.kafka.common.serialization.ByteArrayDeserializer

# STOMP over WebSocket:
#   SockJS:     http://<host>:<port>/ws
#   Native WS:  ws://<host>:<port>/ws-stream
# Subscribe (after STOMP CONNECT):
#   /topic/logs           — JSON LogDto (from logs.raw OTLP)
#   /topic/metrics        — JSON MetricsDto (fleet aggregate, ~1 Hz)
#   /topic/fleet-services — JSON FleetServicesDto (per-service table, ~1 Hz)
#   /topic/host-metrics   — JSON HostMetricsDto (from metrics.raw OTLP)

server:
  port: 8080

clickhouse:
  url: jdbc:clickhouse://100.74.24.124:8123/observability
  username: default
  password:

causr:
  kafka:
    topics:
      metrics-raw: metrics.raw